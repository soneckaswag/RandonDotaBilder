<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 · Black Genesis</title>
    <!-- Шрифт Inter — более современный и строгий -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0b0e0d;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Убираем скролл */
            position: relative;
        }

        /* Агрессивный градиентный фон: чёрный -> зелёный -> розовый */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1aff9e10 0%, transparent 40%),
                        radial-gradient(circle at 90% 70%, #ff44cc20 0%, transparent 40%),
                        radial-gradient(circle at 40% 80%, #00cc8830 0%, transparent 50%),
                        linear-gradient(135deg, #030504 0%, #1a2f2a 70%, #2a1f28 100%);
            z-index: -2;
        }

        /* Текстура легкого шума */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIj48cmVjdCB3aWR0aD0iODAiIGhlaWdodD0iODAiIGZpbGw9IiMwMzA1MDQiIG9wYWNpdHk9IjAuNCIvPjxwYXRoIGQ9Ik0wIDQwaDgwTTQwIDB2ODAiIHN0cm9rZT0iIzFhZmY5ZSIgc3Ryb2tlLXdpZHRoPSIwLjIiIHN0cm9rZS1vcGFjaXR5PSIwLjEiLz48L3N2Zz4=');
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        /* Главный контейнер — без лишних скруглений, матовое стекло с острыми углами */
        .black-genesis {
            width: 100vw;
            height: 100vh;
            background: rgba(5, 12, 10, 0.65);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-left: 1px solid rgba(0, 255, 170, 0.2);
            border-right: 1px solid rgba(255, 80, 200, 0.15);
            box-shadow: 0 0 70px rgba(0, 200, 140, 0.2);
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
        }

        /* Хедер — строгий, минималистичный */
        .genesis-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 16px 16px;
            border-bottom: 2px solid rgba(0, 255, 170, 0.4);
            margin-bottom: 24px;
        }

        .logo-block {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .logo-main {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a0ffd0, #ffa0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .logo-tag {
            font-weight: 500;
            font-size: 16px;
            color: #44ccaa;
            letter-spacing: 1px;
            border-left: 1px solid #44ccaa60;
            padding-left: 16px;
        }

        .version-block {
            display: flex;
            gap: 20px;
            color: #88bba0;
            font-weight: 400;
            font-size: 15px;
        }

        .version-block span {
            background: rgba(0, 20, 10, 0.7);
            padding: 6px 18px;
            border: 1px solid #33aa8850;
            color: #c0ffee;
        }

        /* Кнопка генерации — теперь с геометрией, без круглостей */
        .generate-btn {
            align-self: center;
            margin: 12px 0 28px 0;
            background: rgba(0, 30, 20, 0.6);
            border: 2px solid #44ccaa;
            padding: 20px 100px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            font-size: 40px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #eefff5;
            box-shadow: 0 0 30px #44ccaa, inset 0 0 20px #44ccaa40;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            border-radius: 0; /* Убрал круглости */
        }

        .generate-btn:hover {
            border-color: #ff80c0;
            box-shadow: 0 0 50px #ff44aa, inset 0 0 20px #ff80c0;
            background: rgba(40, 0, 30, 0.5);
            color: white;
        }

        /* Сетка героев — вписываем в оставшуюся высоту */
        .heroes-grid {
            flex: 1;
            display: flex;
            gap: 24px;
            min-height: 0; /* Важно для flex */
            margin-bottom: 20px;
        }

        /* Карточка героя — строгие линии, минимум скруглений */
        .hero-card {
            flex: 1 1 0;
            min-width: 0;
            background: rgba(8, 20, 18, 0.7);
            border: 1px solid #33aa8860;
            padding: 20px 16px 20px 16px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px -20px black, 0 0 0 1px #44ccaa20 inset;
            transition: 0.2s;
            border-radius: 4px; /* Оставил легкий намек, но не скругление */
        }

        .hero-card:hover {
            border-color: #ff80c0;
            box-shadow: 0 0 60px #44ccaa50, 0 0 0 1px #ff80c0 inset;
        }

        /* Портрет героя */
        .hero-portrait {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #44ccaa40;
            padding: 8px 16px 8px 8px;
            margin-bottom: 20px;
            border-radius: 0;
        }

        .hero-img {
            width: 70px;
            height: 70px;
            border: 2px solid #44ccaa;
            object-fit: cover;
            background: #111;
            box-shadow: 0 0 30px #44ccaa;
            border-radius: 0;
        }

        .hero-name {
            font-size: 28px;
            font-weight: 600;
            color: #eeffee;
            text-shadow: 0 0 10px #44ccaa;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* Сетка предметов */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: rgba(0, 15, 10, 0.4);
            border: 1px solid #44ccaa40;
            padding: 16px 12px;
            border-radius: 0;
            flex: 1;
        }

        /* ========== КРАСИВЫЙ ITEM SLOT ========== */
        .item-slot {
            background: linear-gradient(145deg, #0f201c, #03100c);
            border: 1px solid #33aa88;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 4px 8px 4px;
            transition: 0.25s;
            position: relative;
            box-shadow: 0 5px 0 #0a3a2a, 0 8px 20px black; /* Эффект пресса */
            border-radius: 0;
            min-height: 110px;
        }

        /* Двойная обводка для премиальности */
        .item-slot::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 1px dashed #44ccaa60;
            pointer-events: none;
        }

        /* Ботинки — отдельный вайб */
        .item-slot.boots-slot {
            border-color: #ff80c0;
            box-shadow: 0 5px 0 #802040, 0 0 30px #ff44aa80;
            background: linear-gradient(145deg, #2a1a24, #180e14);
        }

        .item-slot.boots-slot::after {
            border-color: #ff80c060;
        }

        .item-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px #44ccaa) brightness(1.3);
            transition: 0.2s;
            z-index: 2;
        }

        .item-slot:hover .item-img {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px #ff80c0) brightness(1.5);
        }

        .item-name {
            font-size: 12px;
            font-weight: 500;
            background: #03100c;
            padding: 4px 10px;
            margin-top: 6px;
            color: #c0ffee;
            border: 1px solid #44ccaa60;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            z-index: 2;
            border-radius: 0;
        }

        .boots-slot .item-name {
            border-color: #ff80c0;
            color: #ffc0e0;
            background: #1a0c14;
        }

        /* Футер — строка состояния */
        .genesis-footer {
            display: flex;
            justify-content: space-between;
            padding: 16px 16px 0 16px;
            border-top: 2px solid rgba(255, 128, 192, 0.3);
            color: #88bba0;
            font-weight: 400;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-badge {
            border: 1px solid #ff80c0;
            padding: 4px 24px;
            color: #ffb0d0;
            background: #1a0f14;
            box-shadow: 0 0 20px #ff44aa40;
        }

        /* Fallback */
        .fallback-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 10px #44ccaa);
            line-height: 1;
        }
    </style>
</head>
<body>
<div class="black-genesis">

<script>

        { name: 'Terrorblade', key: 'terrorblade' }, { name: 'Tidehunter', key: 'tidehunter' }, { name: 'Timbersaw', key: 'timbersaw' },
        { name: 'Tinker', key: 'tinker' }, { name: 'Tiny', key: 'tiny' }, { name: 'Treant Protector', key: 'treant' },

        { name: 'Boots of Travel', key: 'travel_boots' }
    ];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateItemsForHero() {
        const boots = bootsList[Math.floor(Math.random() * bootsList.length)];
        const otherItems = shuffle(allItems.filter(it => !it.key.includes('boots') && !it.key.includes('treads') && !it.key.includes('phase') && !it.key.includes('travel') && !it.key.includes('arcane'))).slice(0, 5);
        const items = [];
        const bootIndex = Math.floor(Math.random() * 6);
        for (let i = 0; i < 6; i++) {
            if (i === bootIndex) {
                items.push({ ...boots, isBoot: true });
            } else {
                const other = otherItems[i < bootIndex ? i : i - 1];
                items.push({ ...other, isBoot: false });
            }
        }
        return items;
    }

    function pickThreeHeroes() {
        return shuffle([...heroes]).slice(0, 3);
    }

    function render() {
        const container = document.getElementById('heroesGrid');
        container.innerHTML = '';
        const selectedHeroes = pickThreeHeroes();

        selectedHeroes.forEach(hero => {
            const items = generateItemsForHero();
            const card = document.createElement('div');
            card.className = 'hero-card';

            const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.key}.png`;

            const portraitDiv = document.createElement('div');
            portraitDiv.className = 'hero-portrait';
            portraitDiv.innerHTML = `
                <img class="hero-img" src="${imgUrl}" alt="${hero.name}" onerror="this.onerror=null; this.src='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/pudge.png';">
                <span class="hero-name">${hero.name}</span>
            `;

            const gridDiv = document.createElement('div');
            gridDiv.className = 'items-grid';

            items.forEach(it => {
                const slot = document.createElement('div');
                slot.className = `item-slot ${it.isBoot ? 'boots-slot' : ''}`;

                const itemImg = document.createElement('img');
                itemImg.className = 'item-img';
                const itemUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/${it.key}.png`;
                itemImg.src = itemUrl;
                itemImg.onerror = function() {
                    this.style.display = 'none';
                    const fallback = document.createElement('span');
                    fallback.className = 'fallback-icon';
                    fallback.innerText = it.isBoot ? '👟' : '⚔️';
                    slot.prepend(fallback);
                };

                const nameSpan = document.createElement('div');
                nameSpan.className = 'item-name';
                nameSpan.innerText = it.name;

                slot.appendChild(itemImg);
                slot.appendChild(nameSpan);
                gridDiv.appendChild(slot);
            });

            card.appendChild(portraitDiv);
            card.appendChild(gridDiv);
            container.appendChild(card);
        });
    }

    document.getElementById('generateBtn').addEventListener('click', render);
    window.addEventListener('load', render);
})();
</script>
</body>
</html>
